name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94
        with:
          components: rustfmt
      - run: cargo fmt -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94
        with:
          components: clippy
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq libopus-dev > /dev/null
      - run: cargo clippy -- -D warnings

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  test-unit:
    runs-on: ubuntu-latest
    env:
      RTPBRIDGE_TEST_TIMEOUT_MULT: 2
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq libopus-dev > /dev/null
      - run: cargo test --lib -- --test-threads=1

  test-integration:
    runs-on: ubuntu-latest
    env:
      RTPBRIDGE_TEST_TIMEOUT_MULT: 2
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq libopus-dev > /dev/null
      - run: cargo test --test '*' -- --test-threads=1

  coverage:
    runs-on: ubuntu-latest
    env:
      RTPBRIDGE_TEST_TIMEOUT_MULT: 2
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq libopus-dev > /dev/null
      - run: cargo install cargo-tarpaulin
      - run: cargo tarpaulin --out xml --skip-clean -- --test-threads=1
      - uses: codecov/codecov-action@v4
        with:
          files: cobertura.xml
          fail_ci_if_error: false
        continue-on-error: true

  bench-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq libopus-dev > /dev/null
      - run: cargo bench --no-run

  build-release:
    runs-on: ubuntu-latest
    env:
      RTPBRIDGE_TEST_TIMEOUT_MULT: 2
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq libopus-dev > /dev/null
      - run: cargo build --release
      - run: cargo test --release --lib -- --test-threads=1

  docker-build:
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false

  docker-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [fmt, clippy, audit, test-unit, test-integration, build-release]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:main

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}:main
          artifact-name: sbom-main.spdx.json
          output-file: sbom.spdx.json

      - name: Scan container image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:main
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          # Ignore base image CVEs with no upstream fix
          trivyignores: .trivyignore
